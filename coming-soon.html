<!DOCTYPE html>
<html lang="en" dir="ltr" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whisker Suites | Coming Soon</title>
    <link rel="icon" type="image/png" href="assets/images/favicon.png">
    <!-- Bootstrap 5 CSS via CDN -->
    <link id="bootstrap-css" rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Custom StyleSheets -->
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/dark-mode.css">
    <link rel="stylesheet" href="assets/css/rtl.css">
    <style>
        body {
            padding-top: 0 !important;
        }
        .auth-toggles {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1050;
        }
        .countdown-item {
            background-color: var(--primary-color);
            color: #ffffff;
            border-radius: 6px;
            padding: 1rem;
            min-width: 80px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="auth-toggles d-flex gap-2">
        <button class="toggle-btn" id="theme-toggle" type="button"><i class="bi bi-moon-fill"></i></button>
        <button class="toggle-btn" id="rtl-toggle" type="button"><span class="toggle-text" style="font-size: 0.75rem; font-weight: 600;">RTL</span></button>
    </div>

    <div class="auth-container text-center">
        <div class="auth-card p-5" style="max-width: 550px;">
            <!-- Brand Logo -->
            <div class="mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" fill="var(--primary-color)" class="bi bi-cat mb-2" viewBox="0 0 16 16">
                    <path d="M14 13.5a.5.5 0 0 1-.5.5h-6a.5.5 0 0 1-.5-.5c0-1.105.895-2 2-2h1c1.105 0 2 .895 2 2M10 8a2 2 0 1 0 0-4 2 2 0 0 0 0 4m.5-3a.5.5 0 1 1-1 0 .5.5 0 0 1 1 0m-4.225.105a.5.5 0 0 0-.65-.228L3.12 6.136a.5.5 0 1 0 .428.904l2.505-1.253a.5.5 0 0 0 .228-.65L5.775 5.1M1 13.5A1.5 1.5 0 0 0 2.5 15h11a1.5 1.5 0 0 0 1.5-1.5c0-1.307-.821-2.42-2-2.859V9.5a.5.5 0 0 0-.154-.354l-.846-.846v-.868c.552-.16 1-.72 1-1.378a1.5 1.5 0 0 0-3 0c0 .657.448 1.218 1 1.378v.868L8.646 9.146A.5.5 0 0 0 8.5 9.5v1.141C7.32 11.08 6.5 12.193 6.5 13.5v.5H2.5c-.552 0-1-.448-1-1v-4.141c0-1.12.637-2.17 1.646-2.67l2.5-1.25a.5.5 0 0 0 .228-.651l-.5-1a.5.5 0 0 0-.895 0l-.5 1A1.5 1.5 0 0 1 3.5 5h-.646a1.5 1.5 0 0 0-1.5 1.5v7Z"/>
                </svg>
                <h1 class="h3-title mb-1" style="font-size: 2rem;">Whisker Suites</h1>
                <p class="small-text text-muted">Boutique Feline Boarding</p>
            </div>

            <h2 class="h3-title mb-3" style="font-size: 1.8rem;">Renovations in Progress</h2>
            <p class="mb-4">I am currently remodeling the suites, building new vertical climbing towers and securing garden-view windows. Sign up to get notified when bookings open!</p>

            <!-- Countdown Timer -->
            <div class="d-flex justify-content-center gap-2 mb-4">
                <div class="countdown-item">
                    <span class="d-block fs-4 font-weight-580">18</span>
                    <span style="font-size: 0.75rem;">Days</span>
                </div>
                <div class="countdown-item">
                    <span class="d-block fs-4 font-weight-580">06</span>
                    <span style="font-size: 0.75rem;">Hours</span>
                </div>
                <div class="countdown-item">
                    <span class="d-block fs-4 font-weight-580">45</span>
                    <span style="font-size: 0.75rem;">Mins</span>
                </div>
            </div>

            <!-- Newsletter Signup Form -->
            <form id="coming-soon-form" class="mb-4 needs-validation" novalidate>
                <div class="input-group">
                    <input type="email" class="form-control" placeholder="Your Email Address" required style="border-radius: 6px 0 0 6px;">
                    <button type="submit" class="btn-custom-primary" style="border-radius: 0 6px 6px 0;">Notify Me</button>
                </div>
                <div class="invalid-feedback text-start">Please enter a valid email.</div>
            </form>

            <!-- Social Handles -->
            <div class="social-icons d-flex justify-content-center gap-3">
                <a href="https://facebook.com" target="_blank" aria-label="Facebook" class="text-primary"><i class="bi bi-facebook fs-4"></i></a>
                <a href="https://instagram.com" target="_blank" aria-label="Instagram" class="text-danger"><i class="bi bi-instagram fs-4"></i></a>
                <a href="https://twitter.com" target="_blank" aria-label="Twitter" class="text-dark"><i class="bi bi-twitter-x fs-4"></i></a>
            </div>

            <div class="mt-4 pt-3 border-top">
                <a href="index.html" class="text-decoration-none small-text">Back to Temporary Home</a>
            </div>
        </div>
    </div>

    <!-- Bootstrap Bundle with Popper JS via CDN -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom Main JS -->
    <script src="assets/js/main.js"></script>
</body>
</html>
