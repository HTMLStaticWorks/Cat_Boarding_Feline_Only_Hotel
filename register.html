<!DOCTYPE html>
<html lang="en" dir="ltr" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whisker Suites | Register</title>
    <link rel="icon" type="image/png" href="assets/images/favicon.png">
    <!-- Bootstrap 5 CSS via CDN -->
    <link id="bootstrap-css" rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Custom StyleSheets -->
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/dark-mode.css">
    <link rel="stylesheet" href="assets/css/rtl.css">
    <style>
        /* Override body offset padding for auth screens */
        body {
            padding-top: 0 !important;
        }
        .auth-container {
            position: relative;
            padding-top: 5rem !important;
        }
        .auth-toggles {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 1050;
        }
        [dir="rtl"] .auth-toggles {
            right: auto;
            left: 20px;
        }
    </style>
</head>
<body>

    <!-- Centered Card Container -->
    <div class="auth-container">
        <!-- Top-Right Switchers -->
        <div class="auth-toggles d-flex gap-2">
            <button class="toggle-btn" id="theme-toggle" type="button"><i class="bi bi-moon-fill"></i></button>
            <button class="toggle-btn" id="rtl-toggle" type="button"><span class="toggle-text" style="font-size: 0.75rem; font-weight: 600;">RTL</span></button>
        </div>

        <div class="auth-card">
            <!-- Brand Logo inside the card -->
            <div class="text-center mb-4">
                <a href="index.html" class="auth-brand-link text-decoration-none d-inline-flex align-items-center">
                    <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" fill="var(--primary-color)" class="bi bi-cat me-2" viewBox="0 0 16 16">
                        <path d="M14 13.5a.5.5 0 0 1-.5.5h-6a.5.5 0 0 1-.5-.5c0-1.105.895-2 2-2h1c1.105 0 2 .895 2 2M10 8a2 2 0 1 0 0-4 2 2 0 0 0 0 4m.5-3a.5.5 0 1 1-1 0 .5.5 0 0 1 1 0m-4.225.105a.5.5 0 0 0-.65-.228L3.12 6.136a.5.5 0 1 0 .428.904l2.505-1.253a.5.5 0 0 0 .228-.65L5.775 5.1M1 13.5A1.5 1.5 0 0 0 2.5 15h11a1.5 1.5 0 0 0 1.5-1.5c0-1.307-.821-2.42-2-2.859V9.5a.5.5 0 0 0-.154-.354l-.846-.846v-.868c.552-.16 1-.72 1-1.378a1.5 1.5 0 0 0-3 0c0 .657.448 1.218 1 1.378v.868L8.646 9.146A.5.5 0 0 0 8.5 9.5v1.141C7.32 11.08 6.5 12.193 6.5 13.5v.5H2.5c-.552 0-1-.448-1-1v-4.141c0-1.12.637-2.17 1.646-2.67l2.5-1.25a.5.5 0 0 0 .228-.651l-.5-1a.5.5 0 0 0-.895 0l-.5 1A1.5 1.5 0 0 1 3.5 5h-.646a1.5 1.5 0 0 0-1.5 1.5v7Z"/>
                    </svg>
                    <span class="h3-title mb-0" style="font-size: 1.15rem; color: var(--primary-color); font-weight: 600;">Whisker Suites</span>
                </a>
                <p class="text-muted" style="font-size: 1.65rem; font-weight: 600; margin-top: 8px; letter-spacing: -0.02em;">Create Owner Account</p>
            </div>

            <!-- Registration Form -->
            <form class="needs-validation" novalidate>
                <div class="mb-3">
                    <label for="registerName" class="form-label font-weight-500">Full Name</label>
                    <input type="text" class="form-control" id="registerName" placeholder="Elena Rostova" required style="border-radius: 6px;">
                    <div class="invalid-feedback">Please enter your name.</div>
                </div>

                <div class="mb-3">
                    <label for="registerEmail" class="form-label font-weight-500">Email Address</label>
                    <input type="email" class="form-control" id="registerEmail" placeholder="name@example.com" required style="border-radius: 6px;">
                    <div class="invalid-feedback">Please enter a valid email.</div>
                </div>
                
                <div class="mb-3">
                    <label for="registerPassword" class="form-label font-weight-500">Password</label>
                    <div class="password-field-wrapper">
                        <input type="password" class="form-control" id="registerPassword" required style="border-radius: 6px; padding-right: 40px;">
                        <i class="bi bi-eye-slash password-toggle-icon" data-target="registerPassword"></i>
                        <div class="invalid-feedback">Please enter a password.</div>
                    </div>
                </div>

                <div class="mb-4">
                    <label for="confirmPassword" class="form-label font-weight-500">Confirm Password</label>
                    <div class="password-field-wrapper">
                        <input type="password" class="form-control" id="confirmPassword" required style="border-radius: 6px; padding-right: 40px;">
                        <i class="bi bi-eye-slash password-toggle-icon" data-target="confirmPassword"></i>
                        <div class="invalid-feedback">Please confirm your password.</div>
                    </div>
                </div>

                <div class="form-check mb-4 text-start">
                    <input class="form-check-input" type="checkbox" id="privacyAgreement" required>
                    <label class="form-check-label small-text text-muted" for="privacyAgreement">
                        I agree to the <a href="coming-soon.html" class="text-decoration-none">Terms of Service</a> and <a href="404.html" class="text-decoration-none">Privacy Policy</a>
                    </label>
                    <div class="invalid-feedback">You must agree before submitting.</div>
                </div>

                <button type="submit" class="btn-custom-primary w-100 mb-3">Sign Up</button>
            </form>

            <div class="text-center mb-3">
                <span class="small-text text-muted">Or sign up with</span>
            </div>

            <!-- Social Logins -->
            <div class="row g-2 mb-4">
                <div class="col-6">
                    <button class="social-login-btn w-100 d-flex align-items-center justify-content-center gap-2">
                        <i class="bi bi-google text-danger"></i> Google
                    </button>
                </div>
                <div class="col-6">
                    <button class="social-login-btn w-100 d-flex align-items-center justify-content-center gap-2">
                        <i class="bi bi-apple"></i> Apple
                    </button>
                </div>
            </div>

            <div class="text-center">
                <span class="small-text text-muted">Already have an account? <a href="login.html" class="text-decoration-none">Login</a></span>
            </div>
        </div>
    </div>

    <!-- Bootstrap Bundle with Popper JS via CDN -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom Main JS -->
    <script src="assets/js/main.js"></script>
</body>
</html>
